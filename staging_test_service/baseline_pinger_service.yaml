# Always-on baseline traffic generator for the serve-validation service.
# Holds a fixed number of in-flight requests per deployment (closed-loop: refill
# on completion) to keep each app exercised; the scheduled locust load tests run
# on top of this baseline. HTTP-only.
#
# Deploy (expand the token placeholder through envsubst, like the locust schedules):
#   export ANYSCALE_SERVICE_TOKEN=...   # serve-validation's bearer token
#   envsubst < baseline_pinger_service.yaml | anyscale service deploy -f -
#
# Tune pool size without editing code via BASELINE_DEFAULT_CONCURRENCY below
# (default 1 in flight per deployment).
name: serve-validation-baseline-pinger

image_uri: anyscale/ray:nightly-py310

working_dir: .

requirements: requirements.txt

compute_config:
  cloud: anyscale_v2_default_cloud
  head_node:
    # BaselinePinger runs num_cpus:2 (set in code): the single send loop holds
    # ~11 in-flight (1 per deployment) + body reads and needs dedicated cores.
    # Bump the instance further if the loop saturates at larger pool sizes.
    instance_type: m7i.2xlarge

env_vars:
  ANYSCALE_SERVICE_TOKEN: "${ANYSCALE_SERVICE_TOKEN}"
  BASELINE_DEFAULT_CONCURRENCY: "1"

applications:
  - name: baseline-pinger
    route_prefix: /
    import_path: baseline_pinger:build_app
    args:
      target_base_url: "https://serve-validation-pyz23.cld-kvedzwag2qa8i5bj.s.anyscaleuserdata-staging.com"
